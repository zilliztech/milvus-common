pull_request_rules:
  - name: Add needs-dco label when DCO check failed
    conditions:
      # branch condition: in this pull request, the changes are based on any branch referenced by BRANCHES
      - or: &BRANCHES
      #  In this pull request, the changes are based on the master branch
          - &MASTER_BRANCH base=master

      - -status-success=DCO
    actions:
      label:
        remove:
          - dco-passed
        add:
          - needs-dco
      comment:
        message: |
          @{{author}} Thanks for your contribution. Please submit with DCO, see the contributing guide https://github.com/milvus-io/milvus/blob/master/CONTRIBUTING.md#developer-certificate-of-origin-dco.

  - name: Add dco-passed label when DCO check passed
    conditions:
      # branch condition: in this pull request, the changes are based on any branch referenced by BRANCHES
      - or: *BRANCHES
      - status-success=DCO
    actions:
      label:
        remove:
          - needs-dco
        add:
          - dco-passed

  - name: Test passed for code changed
    conditions:
      - or: *BRANCHES
      - and:
          - "check-success=pre-commit"
          - "check-success=UT on ubuntu-22.04"
          - "check-success=UT on macos-15"
    actions:
      label:
        add:
          - ci-passed

  - name: Remove ci-passed when checks are not green
    conditions:
      - or: *BRANCHES
      - or:
          - "check-pending=pre-commit"
          - "check-pending=UT on ubuntu-22.04"
          - "check-pending=UT on macos-15"
          - "check-failure=pre-commit"
          - "check-failure=UT on ubuntu-22.04"
          - "check-failure=UT on macos-15"
    actions:
      label:
        remove:
          - ci-passed

  - name: Add ci-passed when only markdown files changed
    conditions:
      - or: *BRANCHES
      - "check-success=pre-commit"
      - "-files~=^(?!.*\\.md$).+"
    actions:
      label:
        add:
          - ci-passed
