name: Unit Test

# This workflow is triggered on pushes or pull request to the repository.
on:
  push:
    branches:
      - master
  pull_request:
    # File paths to consider in the event. Optional; defaults to all.
    paths:
      - 'include/**'
      - 'src/**'
      - 'test/**'
      - 'conanfile.py'
      - 'Makefile'
      - 'CMakeLists.txt'
      - '.github/workflows/ut.yaml'

jobs:
  ut:
    name: UT on ubuntu-22.04
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    env:
      CC: gcc-12
      CXX: g++-12
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Dependency
        run: |
          sudo apt update && sudo apt install -y cmake libaio-dev g++-12 gcc-12 python3 python3-pip \
          && pip3 install conan==2.25.1
      - name: Restore Conan Packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: milvus-common-ubuntu-22.04-${{ hashFiles('conanfile.py')}}
          restore-keys: milvus-common-ubuntu-22.04-
      - name: Setup Conan
        run: |
          conan profile detect --force \
          && conan remote add default-conan-local2 https://milvus01.jfrog.io/artifactory/api/conan/default-conan-local2 --force
      - name: Build & Run
        env:
          CONAN_ARGS: '-o &:with_ut=True -o &:with_asan=True -s compiler.version=12 -s compiler.cppstd=20 -s build_type=Release -of .'
        run: |
          mkdir build && cd build \
          && conan install .. --build=missing $CONAN_ARGS \
          && conan build .. $CONAN_ARGS \
          && ./test/test_cachinglayer/cachinglayer_test && ./test/all_tests
      - name: Save Conan Packages
        uses: actions/cache/save@v4
        with:
          path: ~/.conan2
          key: milvus-common-ubuntu-22.04-${{ hashFiles('conanfile.py')}}
